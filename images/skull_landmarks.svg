<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 450" width="400" height="450">
<rect width="400" height="450" fill="#ffffff"/>
<text x="200" y="25" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#333" font-weight="bold">Skull Positioning Landmarks</text>
<path d="M 200 70 Q 300 70 310 180 Q 310 280 250 340 Q 200 360 160 340 Q 100 300 90 220 Q 85 130 130 80 Q 160 65 200 70" fill="#f5e6d0" stroke="#8b6914" stroke-width="2"/>
<circle cx="140" cy="100" r="4" fill="#e74c3c" stroke="#e74c3c" stroke-width="1"/>
<text x="125" y="100" text-anchor="end" font-family="Arial,sans-serif" font-size="10" fill="#333" font-weight="bold">Vertex</text>
<circle cx="115" cy="175" r="4" fill="#e74c3c" stroke="#e74c3c" stroke-width="1"/>
<text x="105" y="175" text-anchor="end" font-family="Arial,sans-serif" font-size="10" fill="#333" font-weight="bold">Glabella</text>
<circle cx="110" cy="200" r="4" fill="#e74c3c" stroke="#e74c3c" stroke-width="1"/>
<text x="100" y="200" text-anchor="end" font-family="Arial,sans-serif" font-size="10" fill="#333" font-weight="bold">Nasion</text>
<circle cx="130" cy="255" r="4" fill="#e74c3c" stroke="#e74c3c" stroke-width="1"/>
<text x="120" y="255" text-anchor="end" font-family="Arial,sans-serif" font-size="10" fill="#333" font-weight="bold">Acanthion</text>
<circle cx="150" cy="280" r="4" fill="#e74c3c" stroke="#e74c3c" stroke-width="1"/>
<text x="140" y="285" text-anchor="end" font-family="Arial,sans-serif" font-size="10" fill="#333" font-weight="bold">Mental Point</text>
<circle cx="235" cy="170" r="4" fill="#e74c3c" stroke="#e74c3c" stroke-width="1"/>
<text x="245" y="170" text-anchor="start" font-family="Arial,sans-serif" font-size="10" fill="#333" font-weight="bold">EAM</text>
<circle cx="270" cy="190" r="4" fill="#e74c3c" stroke="#e74c3c" stroke-width="1"/>
<text x="280" y="190" text-anchor="start" font-family="Arial,sans-serif" font-size="10" fill="#333" font-weight="bold">Mastoid Tip</text>
<circle cx="195" cy="190" r="4" fill="#e74c3c" stroke="#e74c3c" stroke-width="1"/>
<text x="195" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#333" font-weight="bold">OML</text>
<circle cx="130" cy="230" r="4" fill="#e74c3c" stroke="#e74c3c" stroke-width="1"/>
<text x="120" y="230" text-anchor="end" font-family="Arial,sans-serif" font-size="10" fill="#333" font-weight="bold">Gonion</text>
<line x1="130" y1="195" x2="240" y2="170" stroke="#2980b9" stroke-width="2" stroke-dasharray="5,3"/>
<text x="280" y="155" text-anchor="start" font-family="Arial,sans-serif" font-size="11" fill="#2980b9" font-weight="bold">OML</text>
<line x1="120" y1="210" x2="240" y2="185" stroke="#27ae60" stroke-width="2" stroke-dasharray="5,3"/>
<text x="280" y="175" text-anchor="start" font-family="Arial,sans-serif" font-size="11" fill="#27ae60" font-weight="bold">IOML</text>
<ellipse cx="145" cy="195" rx="15" ry="8" fill="none" stroke="#8b6914" stroke-width="1.5"/>
<ellipse cx="240" cy="185" rx="8" ry="18" fill="none" stroke="#8b6914" stroke-width="1.5"/>
<text x="200" y="400" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#888">OML = Orbitomeatal Line</text>
<text x="200" y="415" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#888">IOML = Infraorbitomeatal Line</text>
<text x="200" y="430" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#888">EAM = External Auditory Meatus</text>
