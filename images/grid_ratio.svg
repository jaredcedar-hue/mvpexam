<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
<rect width="500" height="350" fill="#ffffff"/>
<text x="250" y="25" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#333" font-weight="bold">Grid Ratio and Construction</text>
<text x="140" y="60" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#2980b9" font-weight="bold">8:1 Grid Ratio</text>
<rect x="50" y="75" width="180" height="120" fill="#f0f4f8" stroke="#555" stroke-width="2" rx="0"/>
<line x1="60" y1="75" x2="60" y2="195" stroke="#333" stroke-width="3"/>
<line x1="80" y1="75" x2="80" y2="195" stroke="#333" stroke-width="3"/>
<line x1="100" y1="75" x2="100" y2="195" stroke="#333" stroke-width="3"/>
<line x1="120" y1="75" x2="120" y2="195" stroke="#333" stroke-width="3"/>
<line x1="140" y1="75" x2="140" y2="195" stroke="#333" stroke-width="3"/>
<line x1="160" y1="75" x2="160" y2="195" stroke="#333" stroke-width="3"/>
<line x1="180" y1="75" x2="180" y2="195" stroke="#333" stroke-width="3"/>
<line x1="200" y1="75" x2="200" y2="195" stroke="#333" stroke-width="3"/>
<line x1="220" y1="75" x2="220" y2="195" stroke="#333" stroke-width="3"/>
<line x1="52" y1="210" x2="52" y2="195" stroke="#e74c3c" stroke-width="1.5"/>
<polygon points="52,195 55.8941834230865,204.21060994002886 48.1058165769135,204.21060994002886" fill="#e74c3c"/>
<line x1="52" y1="210" x2="52" y2="225" stroke="#e74c3c" stroke-width="1.5"/>
<polygon points="52,225 48.1058165769135,215.78939005997114 55.8941834230865,215.78939005997114" fill="#e74c3c"/>
<text x="40" y="212" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#e74c3c">h</text>
<line x1="65" y1="200" x2="85" y2="200" stroke="#27ae60" stroke-width="1.5"/>
<polygon points="85,200 75.78939005997115,203.8941834230865 75.78939005997115,196.1058165769135" fill="#27ae60"/>
<text x="75" y="215" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#27ae60">D</text>
<text x="140" y="260" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#555">Ratio = h / D</text>
<text x="140" y="280" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#888">Less cleanup</text>
<text x="140" y="295" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#888">Lower patient dose</text>
<text x="380" y="60" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#8e44ad" font-weight="bold">16:1 Grid Ratio</text>
<rect x="290" y="75" width="180" height="120" fill="#f0f4f8" stroke="#555" stroke-width="2" rx="0"/>
<line x1="295" y1="75" x2="295" y2="195" stroke="#333" stroke-width="2"/>
<line x1="305" y1="75" x2="305" y2="195" stroke="#333" stroke-width="2"/>
<line x1="315" y1="75" x2="315" y2="195" stroke="#333" stroke-width="2"/>
<line x1="325" y1="75" x2="325" y2="195" stroke="#333" stroke-width="2"/>
<line x1="335" y1="75" x2="335" y2="195" stroke="#333" stroke-width="2"/>
<line x1="345" y1="75" x2="345" y2="195" stroke="#333" stroke-width="2"/>
<line x1="355" y1="75" x2="355" y2="195" stroke="#333" stroke-width="2"/>
<line x1="365" y1="75" x2="365" y2="195" stroke="#333" stroke-width="2"/>
<line x1="375" y1="75" x2="375" y2="195" stroke="#333" stroke-width="2"/>
<line x1="385" y1="75" x2="385" y2="195" stroke="#333" stroke-width="2"/>
<line x1="395" y1="75" x2="395" y2="195" stroke="#333" stroke-width="2"/>
<line x1="405" y1="75" x2="405" y2="195" stroke="#333" stroke-width="2"/>
<line x1="415" y1="75" x2="415" y2="195" stroke="#333" stroke-width="2"/>
<line x1="425" y1="75" x2="425" y2="195" stroke="#333" stroke-width="2"/>
<line x1="435" y1="75" x2="435" y2="195" stroke="#333" stroke-width="2"/>
<line x1="445" y1="75" x2="445" y2="195" stroke="#333" stroke-width="2"/>
<line x1="455" y1="75" x2="455" y2="195" stroke="#333" stroke-width="2"/>
<line x1="465" y1="75" x2="465" y2="195" stroke="#333" stroke-width="2"/>
<text x="380" y="260" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#555">Ratio = h / D</text>
<text x="380" y="280" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#888">Better scatter cleanup</text>
<text x="380" y="295" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#888">Higher patient dose</text>
<text x="250" y="330" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#aaa">h = height of lead strip, D = distance between strips</text>
</svg>
