<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 400" width="550" height="400">
<rect width="550" height="400" fill="#ffffff"/>
<text x="275" y="25" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#333" font-weight="bold">Digital Imaging: CR vs DR</text>
<text x="140" y="60" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#2980b9" font-weight="bold">Computed Radiography (CR)</text>
<rect x="50" y="80" width="180" height="30" fill="#b3d9ff" stroke="#2980b9" stroke-width="2" rx="4"/>
<text x="140" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#2980b9">PSP Plate (BaFBr:Eu²⁺)</text>
<line x1="140" y1="115" x2="140" y2="140" stroke="#555" stroke-width="2"/>
<polygon points="140,140 136.1058165769135,130.78939005997114 143.8941834230865,130.78939005997114" fill="#555"/>
<text x="140" y="135" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#555">Expose</text>
<rect x="80" y="145" width="120" height="40" fill="#e6f0ff" stroke="#2980b9" stroke-width="2" rx="4"/>
<text x="140" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#2980b9">CR Reader</text>
<text x="140" y="155" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#888">(Laser scan)</text>
<line x1="140" y1="190" x2="140" y2="215" stroke="#555" stroke-width="2"/>
<polygon points="140,215 136.1058165769135,205.78939005997114 143.8941834230865,205.78939005997114" fill="#555"/>
<rect x="90" y="220" width="100" height="60" fill="#1a1a2e" stroke="#2980b9" stroke-width="2" rx="4"/>
<text x="140" y="255" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#fff">Digital Image</text>
<line x1="275" y1="55" x2="275" y2="350" stroke="#ccc" stroke-width="1" stroke-dasharray="5,5"/>
<text x="415" y="60" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#27ae60" font-weight="bold">Digital Radiography (DR)</text>
<rect x="330" y="80" width="170" height="50" fill="#d4edda" stroke="#27ae60" stroke-width="2" rx="4"/>
<text x="415" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#27ae60">Flat Panel Detector</text>
<text x="415" y="115" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#888">(a-Si or a-Se)</text>
<line x1="415" y1="135" x2="415" y2="165" stroke="#555" stroke-width="2"/>
<polygon points="415,165 411.10581657691347,155.78939005997114 418.89418342308653,155.78939005997114" fill="#555"/>
<text x="415" y="155" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#555">Direct readout</text>
<rect x="365" y="170" width="100" height="60" fill="#1a1a2e" stroke="#27ae60" stroke-width="2" rx="4"/>
<text x="415" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#fff">Digital Image</text>
<text x="275" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#333" font-weight="bold">Key Differences</text>
<text x="140" y="315" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#555">CR: Cassette-based, portable</text>
<text x="140" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#555">Slower workflow, lower cost</text>
<text x="415" y="315" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#555">DR: Fixed or wireless panel</text>
<text x="415" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#555">Faster, higher DQE</text>
<text x="275" y="375" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#aaa">DQE = Detective Quantum Efficiency</text>
</svg>
