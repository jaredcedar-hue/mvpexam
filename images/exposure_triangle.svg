<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 400" width="450" height="400">
<rect width="450" height="400" fill="#ffffff"/>
<text x="225" y="25" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#333" font-weight="bold">Exposure Factor Relationships</text>
<path d="M 225 70 L 100 300 L 350 300 Z" fill="#f0f4f8" stroke="#555" stroke-width="2"/>
<text x="225" y="60" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#e74c3c" font-weight="bold">kVp</text>
<text x="225" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#888">(Penetration/Contrast)</text>
<text x="80" y="325" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#2980b9" font-weight="bold">mAs</text>
<text x="80" y="345" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#888">(Quantity/Density)</text>
<text x="370" y="325" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#27ae60" font-weight="bold">SID</text>
<text x="370" y="345" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#888">(Distance)</text>
<circle cx="225" cy="210" r="40" fill="#fff3cd" stroke="#e67e22" stroke-width="2"/>
<text x="225" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#e67e22" font-weight="bold">Image</text>
<text x="225" y="220" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#e67e22" font-weight="bold">Quality</text>
<text x="225" y="370" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#555">15% Rule: ↑kVp 15% = double density (halve mAs)</text>
<text x="225" y="388" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#555">Inverse Square: I₁/I₂ = (D₂/D₁)²</text>
</svg>
