<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
<rect width="500" height="400" fill="#ffffff"/>
<text x="250" y="25" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#333" font-weight="bold">Radiation Protection — Cardinal Principles</text>
<text x="90" y="65" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#e74c3c" font-weight="bold">TIME</text>
<circle cx="90" cy="120" r="35" fill="#ffe0e0" stroke="#e74c3c" stroke-width="2"/>
<circle cx="90" cy="120" r="25" fill="none" stroke="#e74c3c" stroke-width="1.5"/>
<line x1="90" y1="120" x2="90" y2="103" stroke="#e74c3c" stroke-width="2"/>
<line x1="90" y1="120" x2="103" y2="125" stroke="#e74c3c" stroke-width="2"/>
<text x="90" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#555">Minimize</text>
<text x="90" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#555">exposure time</text>
<text x="250" y="65" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#2980b9" font-weight="bold">DISTANCE</text>
<line x1="200" y1="130" x2="300" y2="130" stroke="#2980b9" stroke-width="2.5"/>
<polygon points="300,130 290.78939005997114,133.8941834230865 290.78939005997114,126.1058165769135" fill="#2980b9"/>
<text x="250" y="125" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#2980b9">Maximize</text>
<text x="250" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#555">Follows inverse</text>
<text x="250" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#555">square law</text>
<text x="410" y="65" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#27ae60" font-weight="bold">SHIELDING</text>
<path d="M 410 90 L 440 100 L 440 140 Q 440 160 410 170 Q 380 160 380 140 L 380 100 Z" fill="#e0f5e0" stroke="#27ae60" stroke-width="2"/>
<text x="410" y="135" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#27ae60" font-weight="bold">Pb</text>
<text x="410" y="195" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#555">Use lead aprons,</text>
<text x="410" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#555">barriers, shields</text>
<rect x="80" y="240" width="340" height="50" fill="#f0f4f8" stroke="#333" stroke-width="2" rx="8"/>
<text x="250" y="270" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#333" font-weight="bold">ALARA — As Low As Reasonably Achievable</text>
<text x="250" y="320" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#333" font-weight="bold">Annual Dose Limits:</text>
<text x="250" y="340" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#555">Occupational: 5 rem (50 mSv) whole body</text>
<text x="250" y="358" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#555">Public: 0.1 rem (1 mSv) whole body</text>
<text x="250" y="376" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#555">Embryo/Fetus: 0.5 rem (5 mSv) total</text>
</svg>
